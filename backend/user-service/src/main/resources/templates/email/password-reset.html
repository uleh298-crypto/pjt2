<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: #2563eb; }
        .content { color: #333; line-height: 1.6; }
        .token-box { background: #f0f9ff; border: 2px solid #2563eb; border-radius: 8px; padding: 20px; text-align: center; margin: 30px 0; }
        .token { font-size: 32px; font-weight: bold; color: #2563eb; letter-spacing: 8px; }
        .btn { display: inline-block; background: #2563eb; color: white; padding: 14px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; margin: 20px 0; }
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; color: #888; font-size: 12px; text-align: center; }
        .notice { background: #fef3c7; border-radius: 4px; padding: 12px; margin-top: 20px; font-size: 14px; color: #92400e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">What's Your ETF</div>
        </div>
        <div class="content">
            <p>안녕하세요,</p>
            <p>비밀번호 재설정을 요청하셨습니다.</p>

            <div class="token-box">
                <p>인증 코드</p>
                <div class="token" th:text="${token}">123456</div>
            </div>

            <p>위 인증 코드를 앱에 입력하여 비밀번호를 재설정해주세요.</p>

            <div class="notice">
                <strong>주의사항</strong><br>
                • 인증 코드는 30분간 유효합니다.<br>
                • 본인이 요청하지 않은 경우, 이 이메일을 무시해주세요.<br>
                • 계정 보안을 위해 비밀번호를 주기적으로 변경해주세요.
            </div>
        </div>
        <div class="footer">
            <p>본 메일은 발신 전용입니다.</p>
            <p>&copy; 2025 What's Your ETF. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
